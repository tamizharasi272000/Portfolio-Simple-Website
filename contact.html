<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="section-1">
            <h1 class="section-1__name">Thamizharasi E</h1>
            <p class="section-1__role">Manual Tester, Front End Developer</p>
            <a class="section-1__contact" href="index.html">Home</a>
        </div>

        <div class="section-2">
            <h2 class="section-2__title">Contact Me</h2>

            <form class="contact-form">

                <table>

                    <tr>
                        <td><label>Name:</label></td>
                        <td>
                            <input type="text"
                                   placeholder="Enter your name"
                                   class="contact-form__input">
                        </td>
                    </tr>

                    <tr>
                        <td><label>Email:</label></td>
                        <td>
                            <input type="email"
                                   placeholder="Enter your email"
                                   class="contact-form__input">
                        </td>
                    </tr>

                    <tr>
                        <td><label>Message:</label></td>
                        <td>
                            <textarea
                                placeholder="Enter your message"
                                class="contact-form__textarea">
                            </textarea>
                        </td>
                    </tr>

                    <tr>
                        <td></td>
                        <td>
                            <input type="submit"
                                   value="Submit"
                                   class="contact-form__submit">
                        </td>
                    </tr>

                </table>

            </form>
        </div>

        <div class="section-5">
            <p class="section-5__title">
                Social Media:
                <a href="https://www.copado.com/">Copado Robotic Testing</a>
                <a href="https://www.careerpower.in/gk-general-knowledge.html">General Knowledge</a>
            </p>

            <p class="section-5__desc">&copy; Thamizharasi E</p>
        </div>

    </div>

</body>
</html>
